name: "Dragon Business: CI/CD"

on:
  push:
    branches: [master]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - 'Dockerfile'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  # ✅ Phase 1: Build, Test, Trivy Source Scan
  ci:
    uses: long1712578/Dragon-k8s-config/.github/workflows/reusable-dotnet-ci.yml@master
    with:
      dotnet-version: '9.0.x'
      solution-path: 'Dragon.Business.csproj'
      test-path: 'Dragon.Business.Tests/Dragon.Business.Tests.csproj'
    secrets: inherit

  # 🐳 Phase 2: Docker Build (Native AOT), Image Scan, GitOps Update
  cd:
    needs: ci
    uses: long1712578/Dragon-k8s-config/.github/workflows/reusable-docker-gitops.yml@master
    with:
      service-name: 'dragon-business'
      docker-context: '.'
      environment: 'develop'
    secrets: inherit
